<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    ============================================================
    FAKE LOGIN PAGE — Educational Demonstration
    ============================================================
    This page mimics the look of a real login form to show
    how attackers clone trusted UIs. Notice:
      - The URL is NOT the real site
      - The padlock/HTTPS doesn't mean the site is legitimate
      - Pixel-perfect clones are trivial for attackers to create
    ============================================================
  -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — SecureBank</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* Deliberately styled to look like a real, trusted banking site */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Fake bank top bar ──────────────────────────────── */
    .topbar {
      background: #003087;        /* classic bank navy */
      color: #fff;
      padding: 0 2rem;
      height: 60px;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .topbar .logo {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .topbar .logo span { color: #ffd700; }
    .topbar-links {
      margin-left: auto;
      display: flex;
      gap: 1.5rem;
      font-size: 0.85rem;
    }
    .topbar-links a { color: rgba(255,255,255,0.8); text-decoration: none; }

    /* ── Main layout ────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    .login-card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
    }

    .login-card h1 {
      font-size: 1.4rem;
      color: #1a1a2e;
      margin-bottom: 0.5rem;
    }
    .login-card p {
      color: #6b7280;
      font-size: 0.88rem;
      margin-bottom: 2rem;
    }

    /* ── Form fields ────────────────────────────────────── */
    .field { margin-bottom: 1.2rem; }
    .field label {
      display: block;
      font-size: 0.83rem;
      font-weight: 600;
      color: #374151;
      margin-bottom: 0.4rem;
    }
    .field input {
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: 1.5px solid #d1d5db;
      border-radius: 6px;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s;
      color: #111;
    }
    .field input:focus {
      outline: none;
      border-color: #003087;
      box-shadow: 0 0 0 3px rgba(0,48,135,0.1);
    }

    /* ── Submit button ──────────────────────────────────── */
    .btn-submit {
      width: 100%;
      background: #003087;
      color: #fff;
      border: none;
      padding: 0.8rem;
      border-radius: 6px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: #001f5c; }

    /* ── Fake trust indicators (attackers use these too!) ── */
    .trust-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 6px;
      padding: 0.6rem 0.9rem;
      font-size: 0.78rem;
      color: #166534;
      margin-bottom: 1.5rem;
    }

    .divider {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1.5rem 0;
    }

    .footer-links {
      text-align: center;
      font-size: 0.8rem;
      color: #9ca3af;
    }
    .footer-links a { color: #003087; text-decoration: none; }

    /* ── Educational overlay ────────────────────────────── */
    /*
      In a real phishing page there would be NO warning banner.
      We add this purely to make the demo educational.
    */
    .phish-warning {
      position: fixed;
      top: 0; left: 0; right: 0;
      background: rgba(255,77,77,0.95);
      color: #fff;
      text-align: center;
      padding: 8px;
      font-size: 0.78rem;
      font-family: 'Inter', sans-serif;
      z-index: 9999;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    body { padding-top: 36px; }
  </style>
</head>
<body>

  <!-- ⚠️ Educational-only warning banner (not present in real attacks) -->
  <div class="phish-warning">
    🎭 DEMO MODE: This is a simulated phishing page for educational purposes — Not a real bank
  </div>

  <!-- Fake bank navigation bar -->
  <div class="topbar">
    <div class="logo">Secure<span>Bank</span></div>
    <div class="topbar-links">
      <a href="#">Personal</a>
      <a href="#">Business</a>
      <a href="#">Support</a>
    </div>
  </div>

  <div class="main">
    <div class="login-card">

      <!-- Fake "Secure Connection" badge — real phishing sites display these too! -->
      <div class="trust-bar">
        🔒 Secure Connection · 256-bit SSL Encryption
      </div>

      <h1>Welcome back</h1>
      <p>Sign in to your SecureBank online account</p>

      <!--
        The form ACTION points to our /capture route.
        A real phishing form would POST to the attacker's server.
      -->
      <form action="/capture" method="POST">

        <div class="field">
          <label for="username">Email / Username</label>
          <!-- placeholder hints make the form look more authentic -->
          <input
            type="text"
            id="username"
            name="username"
            placeholder="you@example.com"
            autocomplete="off"
            required
          />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="off"
            required
          />
        </div>

        <!-- Attacker's harvest button — looks completely normal -->
        <button type="submit" class="btn-submit">Sign In →</button>

      </form>

      <hr class="divider" />

      <div class="footer-links">
        <a href="#">Forgot password?</a> &nbsp;·&nbsp; <a href="#">Register</a>
      </div>

    </div>
  </div>

</body>
</html>
